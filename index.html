<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Deep Learning Virtual Teacher — AI-powered learning platform for mastering deep learning concepts with personalized curriculum, quizzes, notes, and interactive visualizations." />
    <title>Deep Learning Virtual Teacher | AI-Powered Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="cursor-glow"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Premium cursor glow effect
      const glow = document.getElementById('cursor-glow');
      let mx = -200, my = -200;
      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        glow.style.transform = `translate(${mx - 200}px, ${my - 200}px)`;
      });
    </script>
  </body>
</html>
